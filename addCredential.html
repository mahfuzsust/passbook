<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="./node_modules/materialize-css/dist/css/materialize.min.css">
	<title>Add Credential</title>
</head>
<body>
	<div class="container">
	<div class="row">
		<div class="col s12">
			<form style="margin-top:10%;">
                    <div id="errorMessage"></div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="credential_name" id="credential_name" class="validate" autofocus>
                        <label class="active" for="credential_name">Name</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="credential_url" id="credential_url" class="validate" autofocus>
                        <label class="active" for="credential_url">URL</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="credential_username" id="credential_username" class="validate" autofocus>
                        <label class="active" for="credential_username">Username</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="credential_password" id="credential_password" class="validate" autofocus>
                        <label class="active" for="credential_password">Password</label>
                        <a style="cursor:pointer;" id="generate_password">Generate</a>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <button class="btn" type="submit" id="add_book_submit">Submit</button>
                    </div>
                </div>
	        </form>
		</div>
	</div>
</div>
	<script>
      require('./addCredential.js')
    </script>
</body>
</html>
