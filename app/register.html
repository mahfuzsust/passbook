<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="../node_modules/materialize-css/dist/css/materialize.min.css">
	<title>Add Credential</title>
</head>
<body>
	<div class="container">
	<div class="row">
		<div class="col s12">
			<form style="margin-top:10%;">
                <div id="errorMessage"></div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="text" name="username" id="username" class="validate" autofocus>
                        <label class="active" for="username">Username</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="password" name="password" id="password" class="validate">
                        <label class="active" for="password">Password</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <input type="password" name="repassword" id="repassword" class="validate">
                        <label class="active" for="repassword">Re-type Password</label>
                    </div>
                </div>
                <div class="row">
                    <div class="input-field col s12">
                        <button class="btn" type="submit" id="register_submit">Submit</button>
                    </div>
                </div>
	        </form>
		</div>
	</div>
</div>
	<script>
      require('./register.js')
    </script>
</body>
</html>
