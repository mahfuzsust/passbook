<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" type="text/css" href="../node_modules/materialize-css/dist/css/materialize.min.css">
		<link rel="stylesheet" type="text/css" href="../content/style.css">
		<title>Pass Book</title>
	</head>
	<body style="overflow:hidden;">
	  	<div class="row">
			<div class="col s4" >
				<div style="background-color:darkcyan;width:100%;height:70px;line-height:70px;font-size:18pt;color:white;text-align:center;">
					PassBook
				</div>
				<button type="button" class="btn" id="new_book" style="margin-top:3px;background-color:rgb(69, 131, 69);width:100%;">Add New Book</button>
				<input type="text" id="searchBook" onkeyup="searchBook()" placeholder="Search ..." title="Search">
				<div style="overflow:scroll;height:560px;border-right:1px lightgray solid;">
					<div id="empty_book" style="font-size: 14pt; margin-top:30%; color: darkcyan; text-align: center;">Book shelf is empty</div>
					<ul id="book_list" style="display: none;"></ul>
				</div>
			</div>
			<div class="col s8">
				<button type="button" class="btn" id="new_credential" style="background-color:rgb(69, 131, 69);margin-top:3px;width:100%;">Add New Credential</button>
				<div id="empty_credential" style="font-size: 14pt; margin-top:30%; color: darkcyan; text-align: center;">No items to display</div>
				<input type="text" id="searchCredential" onkeyup="searchCredential()" placeholder="Search ..." title="Search">
				<table id="credential_table" class="bordered highlight" style="display:none;overflow:scroll;height:620px;">
					<thead>
						<tr>
							<th>Name</th>
							<th>URL</th>
							<th>Username</th>
							<th>Password</th>
							<th></th>
						</tr>
					</thead>
				
					<tbody id="credentials">
					</tbody>
				</table>
			</div>
		</div>
	
	<script src="../content/fontawesome-all.min.js"></script>
	<script>

	function searchBook() {
		var input, filter, ul, li, a, i;
		input = document.getElementById("searchBook");
		filter = input.value.toUpperCase();
		ul = document.getElementById("book_list");
		li = ul.getElementsByTagName("li");
		for (i = 0; i < li.length; i++) {
			a = li[i].getElementsByTagName("span")[0];
			let upper = a.innerHTML.toUpperCase();
			if (upper.startsWith(filter)) {
				li[i].style.display = "";
			} else {
				li[i].style.display = "none";
			}
		}
	}

	function searchCredential() {
		var input, filter, table, tr, td, i;
		input = document.getElementById("searchCredential");
		filter = input.value.toUpperCase();
		table = document.getElementById("credential_table");
		tr = table.getElementsByTagName("tr");
		for (i = 0; i < tr.length; i++) {
			td = tr[i].getElementsByTagName("td")[0];
			if (td) {
				let span = td.getElementsByTagName("span")[0];
				let upper = span.innerHTML.toUpperCase();
				
				if (upper.startsWith(filter)) {
					tr[i].style.display = "";
				} else {
					tr[i].style.display = "none";
				}
			}       
		}
	}

	  require('./renderer.js')
	</script>
	
	</body>
</html>
