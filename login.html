<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="./node_modules/materialize-css/dist/css/materialize.min.css">
	<title>Add Book</title>
</head>
<body>
	<div class="container">
	<div class="row">
        <div class="col s4"></div>
		<div class="col s4">
			<form style="margin-top:10%;">
			<div class="row">
				<div class="input-field col s12">
					<input type="text" name="name" id="username" class="validate" autofocus>
					<label class="active" for="name">Username</label>
				</div>
			</div>
			<div class="row">
				<div class="input-field col s12">
					<input type="password" name="name" id="password" class="validate">
					<label class="active" for="name">Password</label>
				</div>
			</div>
			<div class="row">
				<div class="input-field col s12">
					<input type="submit" class="btn" id="login">
				</div>
			</div>
		    </form>
        </div>
        <div class="col s4"></div>
	</div>
</div>
	<script>
      require('./login.js')
    </script>
</body>
</html>
